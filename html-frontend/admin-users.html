<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員帳號管理 - WintonEDM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/users.css">
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <h1>WintonEDM</h1>
        </div>
        <div class="navbar-nav">
            <a href="dashboard.html" class="nav-link">儀表板</a>
            <a href="users.html" class="nav-link">使用者管理</a>
            <a href="admin-users.html" class="nav-link active">管理員帳號</a>
            <a href="email-logs.html" class="nav-link">郵件日誌</a>
            <a href="queue.html" class="nav-link">信件佇列</a>
            <a href="analytics.html" class="nav-link">成效分析</a>
            <a href="settings.html" class="nav-link">系統設定</a>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="main-content">
        <div class="container">
            <!-- 頁面標題 -->
            <header class="page-header">
                <h1 class="page-title">管理員帳號管理</h1>
                <button class="btn btn-primary" id="addUserBtn">
                    <i class="icon-plus"></i>
                    新增管理員
                </button>
            </header>

            <!-- 統計卡片 -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalUsers">-</div>
                        <div class="stat-label">總管理員數</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="activeUsers">-</div>
                        <div class="stat-label">活躍帳號</div>
                    </div>
                    <!-- 其他統計可以根據 API 回傳調整 -->
                </div>
            </section>

            <!-- 工具欄 -->
            <section class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <input type="text" 
                               id="searchInput" 
                               class="search-input" 
                               placeholder="搜尋管理員...">
                        <button class="btn btn-primary" id="searchBtn">
                            <i class="icon-search"></i>
                            搜尋
                        </button>
                    </div>
                    <select id="roleFilter" class="form-select">
                        <option value="">所有角色</option>
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                        <option value="Editor">Editor</option>
                        <option value="Viewer">Viewer</option>
                    </select>
                    <select id="statusFilter" class="form-select">
                        <option value="active">啟用</option>
                        <option value="inactive">停用</option>
                        <option value="all">所有狀態</option>
                    </select>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-outline" id="refreshUsersBtn">
                        <i class="icon-refresh"></i>
                        重新整理
                    </button>
                </div>
            </section>

            <!-- 使用者表格 -->
            <section class="table-section">
                <div class="table-container">
                    <table class="data-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" id="selectAll">
                                </th>
                                <th>帳號名稱</th>
                                <th>顯示名稱</th>
                                <th>電子郵件</th>
                                <th>角色</th>
                                <th>狀態</th>
                                <th>最後登入</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="8" class="loading">載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分頁 -->
                <div class="pagination-container" id="paginationContainer">
                    <!-- 分頁將由 JavaScript 動態生成 -->
                </div>
            </section>
        </div>
    </main>

    <!-- 使用者模態框 -->
    <div class="modal" id="userModal" data-component="Modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="userModalTitle">新增管理員</h2>
                <button class="modal-close" id="closeUserModalBtn">
                    <i class="icon-close"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="userForm" class="form">
                    <input type="hidden" id="userId" name="id">
                    
                    <div class="form-group">
                        <label for="username" class="form-label">帳號名稱 *</label>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               class="form-input" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">電子郵件 *</label>
                        <input type="email" 
                               id="email" 
                               name="email" 
                               class="form-input" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="displayName" class="form-label">顯示名稱</label>
                        <input type="text" 
                               id="displayName" 
                               name="displayName" 
                               class="form-input">
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label for="firstName" class="form-label">名字</label>
                                <input type="text" 
                                       id="firstName" 
                                       name="firstName" 
                                       class="form-input">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label for="lastName" class="form-label">姓氏</label>
                                <input type="text" 
                                       id="lastName" 
                                       name="lastName" 
                                       class="form-input">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role" class="form-label">角色 *</label>
                        <select id="role" name="role" class="form-select" required>
                            <option value="">請選擇角色</option>
                            <option value="Admin">Admin</option>
                            <option value="Manager">Manager</option>
                            <option value="Editor">Editor</option>
                            <option value="Viewer">Viewer</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label for="department" class="form-label">部門</label>
                                <input type="text" 
                                       id="department" 
                                       name="department" 
                                       class="form-input">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label for="position" class="form-label">職位</label>
                                <input type="text" 
                                       id="position" 
                                       name="position" 
                                       class="form-input">
                            </div>
                        </div>
                    </div>

                    <div class="form-group" id="passwordGroup">
                        <label for="password" class="form-label">密碼 *</label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">狀態</label>
                        <div class="form-check">
                            <input type="checkbox" 
                                   id="is_active" 
                                   name="is_active" 
                                   class="form-check-input" 
                                   checked>
                            <label for="is_active" class="form-check-label">啟用</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelUserModalBtn">
                    取消
                </button>
                <button type="submit" form="userForm" class="btn btn-primary" id="saveUserBtn">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 重設密碼模態框 -->
    <div class="modal" id="resetPasswordModal" data-component="Modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">重設密碼</h2>
                <button class="modal-close" id="closeResetPasswordModalBtn">
                    <i class="icon-close"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="resetPasswordUserInfo" class="text-info mb-3"></p>
                <form id="resetPasswordForm" class="form">
                    <input type="hidden" id="resetUserId" name="userId">
                    
                    <div class="form-group">
                        <label for="newPassword" class="form-label">新密碼 *</label>
                        <div class="input-group">
                            <input type="password" 
                                   id="newPassword" 
                                   name="newPassword" 
                                   class="form-input" 
                                   required
                                   minlength="8"
                                   title="密碼長度至少8個字符，且必須包含大小寫字母和數字">
                            <button type="button" class="btn-icon toggle-password-visibility" data-target="newPassword">
                                <i class="far fa-eye-slash" id="newPassword-icon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">確認密碼 *</label>
                        <div class="input-group">
                            <input type="password" 
                                   id="confirmPassword" 
                                   name="confirmPassword" 
                                   class="form-input" 
                                   required
                                   minlength="8"
                                   title="密碼長度至少8個字符，且必須包含大小寫字母和數字">
                            <button type="button" class="btn-icon toggle-password-visibility" data-target="confirmPassword">
                                <i class="far fa-eye" id="confirmPassword-icon"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelResetPasswordModalBtn">
                    取消
                </button>
                <button type="submit" form="resetPasswordForm" class="btn btn-primary">
                    重設密碼
                </button>
            </div>
        </div>
    </div>

    <!-- 刪除確認模態框 -->
    <div class="modal" id="deleteConfirmModal" data-component="Modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">確認刪除</h2>
                <button class="modal-close" id="closeDeleteConfirmModalBtn">
                    <i class="icon-close"></i>
                </button>
            </div>
            <div class="modal-body">
                <p>您確定要刪除管理員 <strong id="deleteUserName"></strong> 嗎？</p>
                <p class="text-warning">此操作無法復原。</p>
                <input type="hidden" id="deleteUserId">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelDeleteConfirmModalBtn">
                    取消
                </button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                    確認刪除
                </button>
            </div>
        </div>
    </div>

    <!-- 通知容器 -->
    <div id="notificationContainer" class="notification-container"></div>

    <!-- JavaScript -->
    <script src="js/utils.js?v=3"></script>
    <script src="js/admin-auth.js?v=3"></script>
    <script src="js/admin-auth-guard.js?v=3"></script>
    <script src="js/components.js?v=3"></script>
    <script src="js/adminUserService.js?v=2"></script>
    <script src="js/notification.js?v=3"></script>
    <script src="js/adminUserManager.js?v=2"></script>
</body>
</html>
