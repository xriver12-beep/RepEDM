<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料 - WintonEDM 前台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="user-dashboard.html">
                <i class="fas fa-paper-plane me-2"></i>
                WintonEDM 前台
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="user-dashboard.html">
                            <i class="fas fa-tachometer-alt me-1"></i>
                            儀表板
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="campaigns.html">
                            <i class="fas fa-bullhorn me-1"></i>
                            活動製作
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="subscribers.html">
                            <i class="fas fa-users me-1"></i>
                            訂閱者管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="templates.html">
                            <i class="fas fa-file-alt me-1"></i>
                            EDM管理
                        </a>
                    </li>
                </ul>
                
                <div class="navbar-nav">
                    <div class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <div class="user-info">
                                <i class="fas fa-user-circle me-2"></i>
                                <span id="userDisplayName">載入中...</span>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a href="user-profile.html" class="dropdown-item active">
                                <i class="fas fa-user me-2"></i>
                                個人資料
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item logout-btn" id="logoutBtn" data-action="logout">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                登出
                            </button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容 -->
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-user me-2"></i>
                        個人資料
                    </h1>
                </div>

                <div class="row">
                    <!-- 個人資料卡片 -->
                    <div class="col-lg-8">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="card-title mb-0">
                                    <i class="fas fa-id-card me-2"></i>
                                    基本資料
                                </h5>
                            </div>
                            <div class="card-body">
                                <form id="profileForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="username" class="form-label">使用者名稱</label>
                                            <input type="text" class="form-control" id="username">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="email" class="form-label">電子郵件</label>
                                            <input type="email" class="form-control" id="email">
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-12 mb-3">
                                            <label for="fullName" class="form-label">全名</label>
                                            <input type="text" class="form-control" id="fullName">
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save me-2"></i>
                                            儲存變更
                                        </button>
                                        <button type="button" class="btn btn-secondary" id="cancelBtn">
                                            <i class="fas fa-times me-2"></i>
                                            取消
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- 密碼變更卡片 -->
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0">
                                    <i class="fas fa-lock me-2"></i>
                                    變更密碼
                                </h5>
                            </div>
                            <div class="card-body">
                                <form id="passwordForm">
                                    <div class="mb-3">
                                        <label for="currentPassword" class="form-label">目前密碼</label>
                                        <input type="password" class="form-control" id="currentPassword" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="newPassword" class="form-label">新密碼</label>
                                        <input type="password" class="form-control" id="newPassword" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">確認新密碼</label>
                                        <input type="password" class="form-control" id="confirmPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-warning w-100">
                                        <i class="fas fa-key me-2"></i>
                                        變更密碼
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loadingOverlay" class="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; display: none;">
        <div class="loading-spinner">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">載入中...</span>
            </div>
            <div class="mt-2">載入中...</div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 應用程式 JS -->
    <script src="js/utils.js?v=3"></script>
    <script src="js/state-manager.js?v=3"></script>
    <script src="js/user-auth.js?v=3"></script>
    <script src="js/auth-guard.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/components.js?v=3"></script>
    <script src="js/main.js?v=3"></script>
    
    <!-- 個人資料頁面專用 JS -->
    <script>
        class UserProfileManager {
            constructor() {
                this.originalData = {};
                this.init();
            }

            showLoading() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.style.display = 'flex';
                }
            }

            hideLoading() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.style.display = 'none';
                }
            }

            async init() {
                try {
                    this.showLoading();
                    await this.loadProfile();
                    this.setupEventListeners();
                } catch (error) {
                    console.error('初始化個人資料頁面失敗:', error);
                    // alert('載入個人資料失敗');
                } finally {
                    this.hideLoading();
                }
            }

            async loadProfile() {
                try {
                    console.log('開始載入用戶資料...');
                    
                    if (!window.userAuth) {
                        throw new Error('userAuth 服務未初始化');
                    }
                    
                    const user = await userAuth.getCurrentUser();
                    console.log('獲取到用戶資料:', user);
                    
                    if (!user) {
                        throw new Error('無法獲取用戶資料');
                    }
                    
                    this.originalData = { ...user };
                    
                    document.getElementById('username').value = user.username || '';
                    document.getElementById('email').value = user.email || '';
                    // 優先使用 fullName，如果沒有則嘗試組合 firstName 和 lastName (兼容舊數據)
                    const fullName = user.fullName || user.full_name || 
                                   (user.firstName && user.lastName ? `${user.firstName} ${user.lastName}` : '') || 
                                   user.firstName || user.lastName || '';
                    document.getElementById('fullName').value = fullName;
                    
                    const displayName = user.displayName || user.fullName || user.full_name || user.username || user.email;
                    document.getElementById('userDisplayName').textContent = displayName;
                    
                } catch (error) {
                    console.error('載入個人資料失敗:', error);
                    throw error;
                }
            }

            setupEventListeners() {
                document.getElementById('profileForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.updateProfile();
                });

                document.getElementById('cancelBtn').addEventListener('click', () => {
                    const user = this.originalData;
                    // 重置所有欄位
                    document.getElementById('username').value = user.username || '';
                    document.getElementById('email').value = user.email || '';
                    
                    const fullName = user.fullName || user.full_name || 
                                   (user.firstName && user.lastName ? `${user.firstName} ${user.lastName}` : '') || 
                                   user.firstName || user.lastName || '';
                    document.getElementById('fullName').value = fullName;
                    
                    // 顯示提示訊息
                    // alert('已取消變更，還原為原始資料');
                });

                document.getElementById('passwordForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.changePassword();
                });

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    if (window.AuthGuard) {
                        window.AuthGuard.logout();
                    } else {
                        localStorage.removeItem('authToken');
                        window.location.href = 'user-login.html';
                    }
                });
            }

            async updateProfile() {
                try {
                    this.showLoading();
                    
                    const formData = {
                        fullName: document.getElementById('fullName').value,
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value
                    };

                    const response = await fetch('/api/auth/profile', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${userAuth.getToken()}`
                        },
                        body: JSON.stringify(formData)
                    });

                    const result = await response.json();

                    if (result.success || response.ok) {
                        alert('個人資料更新成功');
                        await this.loadProfile();
                    } else {
                        throw new Error(result.message || '更新失敗');
                    }

                } catch (error) {
                    console.error('更新個人資料失敗:', error);
                    alert('更新個人資料失敗: ' + error.message);
                } finally {
                    this.hideLoading();
                }
            }

            async changePassword() {
                try {
                    const currentPassword = document.getElementById('currentPassword').value;
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (newPassword !== confirmPassword) {
                        alert('新密碼與確認密碼不符');
                        return;
                    }

                    if (newPassword.length < 8) {
                        alert('新密碼長度至少需要 8 個字元');
                        return;
                    }
                    
                    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/;
                    if (!passwordRegex.test(newPassword)) {
                        alert('密碼必須包含大小寫字母和數字');
                        return;
                    }

                    this.showLoading();

                    const response = await fetch('/api/auth/password', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${userAuth.getToken()}`
                        },
                        body: JSON.stringify({
                            currentPassword,
                            newPassword,
                            confirmPassword
                        })
                    });

                    const result = await response.json();

                    if (result.success || response.ok) {
                        alert('密碼變更成功，請重新登入');
                        if (window.AuthGuard) {
                            window.AuthGuard.logout();
                        } else {
                            localStorage.removeItem('authToken');
                            window.location.href = 'user-login.html';
                        }
                    } else {
                        throw new Error(result.message || '密碼變更失敗');
                    }

                } catch (error) {
                    console.error('密碼變更失敗:', error);
                    alert('密碼變更失敗: ' + error.message);
                } finally {
                    this.hideLoading();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.profileManager = new UserProfileManager();
        });
    </script>
</body>
</html>
