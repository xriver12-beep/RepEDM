<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小測試</title>
</head>
<body>
    <h1>最小測試</h1>
    <div id="result"></div>

    <script>
        console.log('Page script started');
    </script>
    
    <script src="js/admin-auth.js"></script>
    
    <script>
        console.log('After admin-auth.js');
        console.log('window.adminAuth:', window.adminAuth);
        
        const resultDiv = document.getElementById('result');
        if (window.adminAuth) {
            resultDiv.innerHTML = '<p style="color: green;">✅ AdminAuth 加載成功</p>';
        } else {
            resultDiv.innerHTML = '<p style="color: red;">❌ AdminAuth 加載失敗</p>';
        }
    </script>
</body>
</html>
