<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密碼 - WintonEDM 電子報管理系統</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 改善變更密碼頁面的專用樣式 */
        .change-password-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .change-password-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.6s ease-out;
        }

        .change-password-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .change-password-header .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .change-password-header .logo i {
            font-size: 2.2rem;
            color: white;
        }

        .change-password-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin: 0.5rem 0;
            letter-spacing: -0.025em;
        }

        .change-password-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #374151;
            margin: 1rem 0 0.5rem;
        }

        .change-password-header .subtitle {
            color: #6b7280;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
        }

        /* 改善表單樣式 */
        .enhanced-form-group {
            margin-bottom: 1.8rem;
        }

        .enhanced-form-group label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.75rem;
        }

        .enhanced-form-group label i {
            font-size: 1.1rem;
            color: #3b82f6;
            width: 20px;
            text-align: center;
        }

        /* 改善密碼輸入容器 */
        .enhanced-password-container {
            position: relative;
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .enhanced-password-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        .enhanced-password-container input {
            width: 100%;
            padding: 1.2rem 3.5rem 1.2rem 1.2rem;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            color: #1f2937;
            outline: none;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .enhanced-password-container input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .enhanced-password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #f3f4f6;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .enhanced-password-toggle:hover {
            background: #e5e7eb;
            color: #374151;
            transform: translateY(-50%) scale(1.05);
        }

        .enhanced-password-toggle i {
            font-size: 1.1rem;
        }

        /* 密碼要求提示 */
        .password-requirements {
            margin-top: 0.75rem;
            padding: 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .password-requirements small {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.5;
            display: block;
        }

        /* 改善錯誤和成功訊息 */
        .enhanced-error-message {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 1rem 0;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .enhanced-success-message {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 1rem 0;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 改善提交按鈕 */
        .enhanced-submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .enhanced-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .enhanced-submit-btn:active {
            transform: translateY(0);
        }

        .enhanced-submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .enhanced-submit-btn i {
            font-size: 1.1rem;
        }

        /* 改善返回連結 */
        .enhanced-back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #3b82f6;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
        }

        .enhanced-back-link:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #1d4ed8;
            transform: translateX(-2px);
        }

        /* 響應式設計 */
        @media (max-width: 480px) {
            .change-password-container {
                padding: 1rem;
            }
            
            .change-password-card {
                padding: 2rem 1.5rem;
            }
            
            .change-password-header h1 {
                font-size: 1.5rem;
            }
            
            .change-password-header h2 {
                font-size: 1.3rem;
            }
            
            .change-password-header .logo {
                width: 70px;
                height: 70px;
            }
            
            .change-password-header .logo i {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <div class="change-password-card">
            <div class="change-password-header">
                <div class="logo">
                    <i class="fas fa-envelope"></i>
                </div>
                <h1>WintonEDM</h1>
                <h2>修改密碼</h2>
                <p class="subtitle">為了您的帳戶安全，請設定新密碼</p>
            </div>

            <form id="changePasswordForm">
                <div class="enhanced-form-group">
                    <label for="currentPassword">
                        <i class="fas fa-lock"></i>
                        目前密碼
                    </label>
                    <div class="enhanced-password-container">
                        <input 
                            type="password" 
                            id="currentPassword" 
                            name="currentPassword" 
                            required 
                            autocomplete="current-password"
                            placeholder="請輸入目前密碼"
                        >
                        <button type="button" class="enhanced-password-toggle" data-target="currentPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="enhanced-form-group">
                    <label for="newPassword">
                        <i class="fas fa-key"></i>
                        新密碼
                    </label>
                    <div class="enhanced-password-container">
                        <input 
                            type="password" 
                            id="newPassword" 
                            name="newPassword" 
                            required 
                            autocomplete="new-password"
                            placeholder="請輸入新密碼（至少8個字符）"
                            minlength="8"
                        >
                        <button type="button" class="enhanced-password-toggle" data-target="newPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <small>
                            <i class="fas fa-info-circle"></i>
                            密碼至少需要 8 個字符，建議包含大小寫字母、數字和特殊字符
                        </small>
                    </div>
                </div>

                <div class="enhanced-form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-double"></i>
                        確認新密碼
                    </label>
                    <div class="enhanced-password-container">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            required 
                            autocomplete="new-password"
                            placeholder="請再次輸入新密碼"
                            minlength="8"
                        >
                        <button type="button" class="enhanced-password-toggle" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="enhanced-error-message" id="errorMessage"></div>
                <div class="enhanced-success-message" id="successMessage"></div>

                <button type="submit" class="enhanced-submit-btn" id="changePasswordBtn">
                    <i class="fas fa-save"></i>
                    更新密碼
                </button>
            </form>

            <div style="text-align: center;">
                <a href="dashboard.html" class="enhanced-back-link">
                    <i class="fas fa-arrow-left"></i>
                    返回儀表板
                </a>
            </div>
        </div>
    </div>

    <!-- 載入必要的 JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/change-password.js"></script>
</body>
</html>
