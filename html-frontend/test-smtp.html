<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTP 設定測試</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>SMTP 設定測試</h1>
    
    <form id="smtpForm">
        <div class="form-group">
            <label for="smtpHost">SMTP 主機</label>
            <input type="text" id="smtpHost" value="smtp.gmail.com">
        </div>
        
        <div class="form-group">
            <label for="smtpPort">SMTP 埠號</label>
            <input type="number" id="smtpPort" value="587">
        </div>
        
        <div class="form-group">
            <label for="smtpSecurity">安全性</label>
            <select id="smtpSecurity">
                <option value="tls">TLS</option>
                <option value="ssl">SSL</option>
                <option value="none">無</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="smtpUsername">使用者名稱</label>
            <input type="text" id="smtpUsername" value="test@gmail.com">
        </div>
        
        <div class="form-group">
            <label for="smtpPassword">密碼</label>
            <input type="password" id="smtpPassword" value="testpassword">
        </div>
        
        <button type="button" onclick="testSmtpSettings()">保存 SMTP 設定</button>
        <button type="button" onclick="testSmtpConnection()">測試 SMTP 連線</button>
    </form>
    
    <div id="result"></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>
        async function testSmtpSettings() {
            const resultDiv = document.getElementById('result');
            
            try {
                const settings = {
                    host: document.getElementById('smtpHost').value,
                    port: parseInt(document.getElementById('smtpPort').value),
                    secure: document.getElementById('smtpSecurity').value === 'ssl',
                    username: document.getElementById('smtpUsername').value,
                    password: document.getElementById('smtpPassword').value
                };

                console.log('發送到後端的 SMTP 設定:', settings);
                
                const response = await settingsService.updateSettings('smtp', settings);
                
                if (response.success) {
                    resultDiv.innerHTML = `<div class="result success">✅ SMTP 設定保存成功</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ 保存失敗: ${response.message}</div>`;
                }
                
                console.log('API 回應:', response);
                
            } catch (error) {
                console.error('保存 SMTP 設定失敗:', error);
                resultDiv.innerHTML = `<div class="result error">❌ 保存失敗: ${error.message}</div>`;
            }
        }

        async function testSmtpConnection() {
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await settingsService.testSmtp();
                
                if (response.success) {
                    resultDiv.innerHTML = `<div class="result success">✅ SMTP 連線測試成功</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ 連線測試失敗: ${response.message}</div>`;
                }
                
                console.log('測試回應:', response);
                
            } catch (error) {
                console.error('測試 SMTP 連線失敗:', error);
                resultDiv.innerHTML = `<div class="result error">❌ 連線測試失敗: ${error.message}</div>`;
            }
        }

        // 頁面載入時檢查認證狀態
        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminAuthToken');
            if (!token) {
                document.getElementById('result').innerHTML = 
                    '<div class="result error">⚠️ 未找到認證 token，請先登入管理後台</div>';
            } else {
                console.log('找到認證 token:', token.substring(0, 20) + '...');
                
                // 手動設置管理員認證 token
                apiClient.setAuthToken(token);
                console.log('已設置管理員認證 token');
                
                // 自動執行測試（延遲 2 秒）
                setTimeout(() => {
                    console.log('自動執行 SMTP 設定測試...');
                    testSmtpSettings();
                }, 2000);
            }
        });
    </script>
</body>
</html>
