<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 - WintonEDM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo" style="background: transparent; box-shadow: none;">
                    <img src="/uploads/logos/logo-1767066330043-367809270.jpg" alt="WintonEDM Logo" style="width: 100%; height: auto; object-fit: contain;">
                </div>
                <h1 class="login-title">忘記密碼</h1>
                <p class="login-subtitle">請輸入您的電子郵件以重置密碼</p>
            </div>

            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        電子郵件
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="請輸入您的電子郵件"
                        required
                    >
                    <div class="input-error" id="emailError"></div>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span class="btn-text">發送重置連結</span>
                    <div class="btn-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                        發送中...
                    </div>
                </button>

                <div class="login-error" id="formError" style="display: none;"></div>
                <div class="login-success" id="formSuccess" style="display: none; color: green; text-align: center; margin-top: 10px;"></div>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="login.html" style="color: #667eea; text-decoration: none;">返回登入</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        // Determine API_BASE_URL
        const hostname = window.location.hostname;
        const protocol = window.location.protocol;
        const port = window.location.port;
        let API_BASE_URL;
        if (port === '3443' || (protocol === 'https:' && !port)) {
             API_BASE_URL = '/api';
        } else {
             const apiHost = hostname === '127.0.0.1' ? 'localhost' : hostname;
             API_BASE_URL = `http://${apiHost}:3001/api`; 
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');
            const errorDiv = document.getElementById('formError');
            const successDiv = document.getElementById('formSuccess');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'block';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = data.message;
                    successDiv.style.display = 'block';
                } else {
                    throw new Error(data.message || '發送失敗');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
