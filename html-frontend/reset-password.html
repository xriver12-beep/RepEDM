<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密碼 - WintonEDM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo" style="background: transparent; box-shadow: none;">
                    <img src="/uploads/logos/logo-1767066330043-367809270.jpg" alt="WintonEDM Logo" style="width: 100%; height: auto; object-fit: contain;">
                </div>
                <h1 class="login-title">重置密碼</h1>
                <p class="login-subtitle">請輸入您的新密碼</p>
            </div>

            <form id="resetPasswordForm" class="login-form">
                <input type="hidden" id="token">
                
                <div class="form-group">
                    <label for="newPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        新密碼
                    </label>
                    <div class="password-input-container">
                        <input type="password" id="newPassword" class="form-input" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        確認新密碼
                    </label>
                    <div class="password-input-container">
                        <input type="password" id="confirmPassword" class="form-input" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span class="btn-text">重置密碼</span>
                    <div class="btn-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                        處理中...
                    </div>
                </button>

                <div class="login-error" id="formError" style="display: none;"></div>
                <div class="login-success" id="formSuccess" style="display: none; color: green; text-align: center; margin-top: 10px;"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <a href="login.html" style="color: #667eea; text-decoration: none;">返回登入</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        // Determine API_BASE_URL
        const hostname = window.location.hostname;
        const protocol = window.location.protocol;
        const port = window.location.port;
        let API_BASE_URL;
        if (port === '3443' || (protocol === 'https:' && !port)) {
             API_BASE_URL = '/api';
        } else {
             const apiHost = hostname === '127.0.0.1' ? 'localhost' : hostname;
             API_BASE_URL = `http://${apiHost}:3001/api`; 
        }

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) {
            alert('無效的重置連結');
            window.location.href = 'login.html';
        }
        document.getElementById('token').value = token;

        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                document.getElementById('formError').textContent = '兩次輸入的密碼不一致';
                document.getElementById('formError').style.display = 'block';
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');
            const errorDiv = document.getElementById('formError');
            const successDiv = document.getElementById('formSuccess');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'block';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword, confirmPassword })
                });
                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = data.message;
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || '重置失敗');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
